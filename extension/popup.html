<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindlelator</title>
  <style>
    body { font-family: Arial, sans-serif; width: 260px; margin: 0; padding: 12px; }
    button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; }
    #status { margin-top: 12px; font-size: 13px; color: #333; min-height: 40px; white-space: pre-line; }
  </style>
</head>
<body>
  <div>
    <label for="backendUrlInput">Backend URL</label>
    <input id="backendUrlInput" type="url" placeholder="http://127.0.0.1:8000" />
    <button id="savePortBtn">Save URL</button>
  </div>
  <button id="captureBtn">Capture & Translate</button>
  <div id="status">Ready to capture.</div>
  <script src="popup.js"></script>
</body>
</html>
